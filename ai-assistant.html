<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Clinical Assistant - Aurevica Lumina</title>
    <meta name="description" content="Use Aurevica Lumina's conversational AI assistant to check symptoms, analyze potential diseases in any language, and generate personalized diet plans.">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header Navigation -->
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">
                <svg viewBox="0 0 24 24">
                    <path d="M4.5 10.5C4.5 6.35817 7.85817 3 12 3C16.1418 3 19.5 6.35817 19.5 10.5V14.25C19.5 17.9779 16.4779 21 12.75 21H11.25C7.52208 21 4.5 17.9779 4.5 14.25V10.5Z" />
                    <path d="M9 10H15M12 7V13" />
                </svg>                Aurevica            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="ai-assistant.html" class="active">AI Assistant</a></li>
                <li><a href="health-tracker.html">Tracker</a></li>
                <li><a href="medical-knowledge.html">Diseases</a></li>
                <li><a href="organ-health.html">Organ Health</a></li>
                <li><a href="pharmacy.html">Medications</a></li>
                <li><a href="organ-health.html">Organ Health</a></li>
                <li><a href="pharmacy.html">Medications</a></li>
                <li><a href="speech-therapy.html">Speech Therapy</a></li>
                <li><a href="consultation.html">Consultation</a></li>
                <li><a href="report-analysis.html">Report Analysis</a></li>
                <li><a href="pricing.html">Plans</a></li>
                <li><a href="login.html" class="nav-btn">Login</a></li>
            </ul>
        </div>
    </header>

    <main class="chat-layout">
        <!-- Chat Sidebar -->
        <aside class="chat-sidebar">
            <div class="chat-sidebar-title">Clinical AI Modules</div>
            <div class="chat-modes">
                <button class="chat-mode-btn active" data-mode="symptoms" id="symptoms-mode-btn">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                    Symptom Checker
                </button>
                <button class="chat-mode-btn" data-mode="diet" id="diet-mode-btn">
                    <svg viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9 0 2.12.74 4.07 1.97 5.61L4.35 19.4c-.39.39-.39 1.02 0 1.41.39.39 1.02.39 1.41 0l1.9-1.9C9.17 19.62 10.53 20 12 20c4.97 0 9-4.03 9-9s-4.03-9-9-9zm0 15c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6z"/></svg>
                    AI Diet Planner
                </button>
            </div>
            
            <div style="margin-top: auto; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
                <label for="lang-select" style="font-size: 0.8rem; font-weight: 600; color: var(--text-muted); display: block; margin-bottom: 0.5rem;">Preferred Language</label>
                <select id="lang-select" class="lang-select" style="width: 100%; margin-bottom: 1rem;">
                    <option value="en">English</option>
                    <option value="hi">हिन्दी (Hindi)</option>
                    <option value="es">Español (Spanish)</option>
                    <option value="ja">日本語 (Japanese)</option>
                </select>
                
                <label for="api-key-input" style="font-size: 0.8rem; font-weight: 600; color: var(--text-muted); display: block; margin-bottom: 0.5rem;">Local Gemini API Key</label>
                <div style="display: flex; gap: 0.5rem;">
                    <input type="password" id="api-key-input" class="form-input" style="font-size: 0.8rem; padding: 0.4rem; background: var(--surface-container-high); color: var(--text-main); border: 1px solid var(--border-color); border-radius: var(--radius-md); width: 100%;" placeholder="AIzaSy...">
                    <button id="save-key-btn" class="btn btn-secondary" style="padding: 0.4rem 0.8rem; font-size: 0.8rem; white-space: nowrap;">Save</button>
                </div>
                <span id="key-status" style="font-size: 0.7rem; color: var(--secondary-color); margin-top: 0.25rem; display: block;"></span>
            </div>
        </aside>

        <!-- Chat Container -->
        <section class="chat-container">
            <div class="chat-header">
                <div class="chat-user-info">
                    <div class="chat-avatar">
                        <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 0 0-10 10c0 5.523 4.477 10 10 10s10-4.477 10-10A10 10 0 0 0 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                    </div>
                    <div class="chat-title">
                        <h3>Aurevica Lumina Clinical AI</h3>
                        <p>Active Diagnostic Node</p>
                    </div>
                </div>
                <div>
                    <span style="font-size: 0.8rem; background-color: var(--secondary-light); color: var(--secondary-color); padding: 0.25rem 0.75rem; border-radius: 20px; font-weight: 600;">HIPAA Compliant</span>
                </div>
            </div>

            <!-- Messages Area -->
            <div class="chat-messages" id="chat-messages">
                <!-- Messages will be injected dynamically via JS -->
            </div>

            <!-- Input Area -->
            <div class="chat-input-area">
                <input type="text" id="chat-input" class="chat-input" placeholder="Type your symptoms (e.g. 'I have a fever and headache')..." aria-label="Symptom or diet query">
                <button id="chat-send-btn" class="chat-send-btn" aria-label="Send message">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </section>
    </main>

    <!-- Main JS -->
    <script src="main.js"></script>
</body>
</html>
